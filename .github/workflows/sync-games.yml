name: Sync Google Play games

on:
  schedule:
    - cron: "23 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-google-play-games
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out website
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Sync catalog
        run: python scripts/sync_games.py

      - name: Commit catalog changes
        shell: bash
        run: |
          if git diff --quiet -- games.json; then
            echo "Google Play catalog is unchanged."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add games.json
          git commit -m "Sync Google Play game catalog"
          git push
